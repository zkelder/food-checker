services:
  api:
    image: 627225873907.dkr.ecr.us-east-1.amazonaws.com/food-checker-api:${IMAGE_TAG:-latest}
    container_name: food-checker-api
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: food-checker-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    depends_on:
      - api
      - node_exporter

  grafana:
    image: grafana/grafana:11.5.2
    container_name: food-checker-grafana
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    depends_on:
      - prometheus

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: food-checker-node-exporter
    ports:
      - "127.0.0.1:9100:9100"
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"
    restart: unless-stopped

volumes:
  grafana-data:
