name: Backend Image

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Validate ECR repository URL
        env:
          ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
        run: test -n "$ECR_REPOSITORY_URL"

      - name: Build backend image
        env:
          ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
        run: docker build --file Dockerfile --tag "$ECR_REPOSITORY_URL:$GITHUB_SHA" --tag "$ECR_REPOSITORY_URL:latest" .

      - name: Push backend image
        env:
          ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
        run: |
          docker push "$ECR_REPOSITORY_URL:$GITHUB_SHA"
          docker push "$ECR_REPOSITORY_URL:latest"
