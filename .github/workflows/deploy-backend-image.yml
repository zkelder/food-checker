name: Deploy Backend Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Backend image tag to deploy"
        required: false
        default: latest

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      BACKEND_INSTANCE_ID: ${{ vars.BACKEND_INSTANCE_ID || 'i-0afba26c985599177' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      IMAGE_TAG: ${{ inputs.image_tag }}

    steps:
      - name: Validate deployment inputs
        env:
          AWS_OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
        run: |
          set -euo pipefail

          test -n "$AWS_OIDC_ROLE_ARN"
          test -n "$AWS_REGION"
          test -n "$BACKEND_INSTANCE_ID"
          test -n "$ECR_REPOSITORY_URL"
          test -n "$IMAGE_TAG"

          if ! [[ "$IMAGE_TAG" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            echo "image_tag may only contain letters, numbers, dots, underscores, and hyphens." >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Send SSM deploy command
        id: send-command
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os

          image_tag = os.environ["IMAGE_TAG"]
          repository_url = os.environ["ECR_REPOSITORY_URL"]
          registry_url = repository_url.rsplit("/", 1)[0]

          script = "\n".join(
              [
                  "set -euo pipefail",
                  "export HOME=/root",
                  "cd /home/ubuntu/food-checker",
                  "(git config --global --get-all safe.directory || true) | grep -Fx /home/ubuntu/food-checker >/dev/null || git config --global --add safe.directory /home/ubuntu/food-checker",
                  "git pull",
                  f"aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin {registry_url}",
                  f"IMAGE_TAG={image_tag} docker compose -f docker-compose.prod.yml pull",
                  f"IMAGE_TAG={image_tag} docker compose -f docker-compose.prod.yml up -d",
                  "curl -f http://127.0.0.1:8000/health",
                  "docker logs food-checker-api --tail 40",
              ]
          )

          commands = [
              "cat > /tmp/food-checker-deploy.sh <<'EOF'\n" + script + "\nEOF",
              "chmod +x /tmp/food-checker-deploy.sh",
              "bash /tmp/food-checker-deploy.sh",
          ]

          with open("/tmp/ssm-parameters.json", "w", encoding="utf-8") as handle:
              json.dump({"commands": commands}, handle)
          PY

          command_id="$(
            aws ssm send-command \
              --instance-ids "$BACKEND_INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy Food Checker backend image ${IMAGE_TAG}" \
              --parameters file:///tmp/ssm-parameters.json \
              --query "Command.CommandId" \
              --output text
          )"

          echo "command_id=${command_id}" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command ${command_id} to ${BACKEND_INSTANCE_ID}."

      - name: Wait for SSM deploy command
        id: wait-command
        run: |
          set -euo pipefail

          command_id="${{ steps.send-command.outputs.command_id }}"
          status="Pending"

          for _ in $(seq 1 90); do
            status="$(
              aws ssm get-command-invocation \
                --command-id "$command_id" \
                --instance-id "$BACKEND_INSTANCE_ID" \
                --query "Status" \
                --output text 2>/dev/null || true
            )"

            case "$status" in
              Success|Failed|Cancelled|TimedOut)
                break
                ;;
            esac

            sleep 5
          done

          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "SSM command ${command_id} finished with status: ${status}"

      - name: Fetch SSM command output
        run: |
          set -euo pipefail

          command_id="${{ steps.send-command.outputs.command_id }}"
          status="${{ steps.wait-command.outputs.status }}"

          echo "Standard output:"
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$BACKEND_INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text

          echo "Standard error:"
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$BACKEND_INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text

          test "$status" = "Success"
