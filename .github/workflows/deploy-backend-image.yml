name: Deploy Backend Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Backend image tag to deploy"
        required: false
        default: latest

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      BACKEND_INSTANCE_ID: ${{ vars.BACKEND_INSTANCE_ID || 'i-0afba26c985599177' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      IMAGE_TAG: ${{ inputs.image_tag }}

    steps:
      - name: Validate deployment inputs
        env:
          AWS_OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
        run: |
          set -euo pipefail

          test -n "$AWS_OIDC_ROLE_ARN"
          test -n "$AWS_REGION"
          test -n "$BACKEND_INSTANCE_ID"
          test -n "$ECR_REPOSITORY_URL"
          test -n "$IMAGE_TAG"

          if ! [[ "$IMAGE_TAG" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            echo "image_tag may only contain letters, numbers, dots, underscores, and hyphens." >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Send SSM deploy command
        id: send-command
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os

          image_tag = os.environ["IMAGE_TAG"]
          repository_url = os.environ["ECR_REPOSITORY_URL"]
          registry_url = repository_url.rsplit("/", 1)[0]

          script = "\n".join(
              [
                  "set -euo pipefail",
                  "export HOME=/root",
                  "",
                  "section() {",
                  "  printf '\\n== %s ==\\n' \"$1\"",
                  "}",
                  "",
                  "print_backend_logs() {",
                  "  docker logs food-checker-api --tail \"${1:-80}\" || true",
                  "}",
                  "",
                  "section \"Requested deploy image\"",
                  f"echo \"Image tag: {image_tag}\"",
                  f"echo \"Repository: {repository_url}\"",
                  "",
                  "section \"Current image/container state before deploy\"",
                  "docker ps --filter name=food-checker-api --format 'table {{.Names}}\\t{{.Image}}\\t{{.Status}}\\t{{.Ports}}' || true",
                  "echo \"Currently running image:\"",
                  "docker inspect food-checker-api --format '{{.Config.Image}}' || true",
                  "",
                  "section \"Disk/docker usage before deploy\"",
                  "df -h",
                  "docker system df || true",
                  "",
                  "section \"Deploy pull/up\"",
                  "cd /home/ubuntu/food-checker",
                  "(git config --global --get-all safe.directory || true) | grep -Fx /home/ubuntu/food-checker >/dev/null || git config --global --add safe.directory /home/ubuntu/food-checker",
                  "git pull",
                  f"aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin {registry_url}",
                  f"IMAGE_TAG={image_tag} docker compose -f docker-compose.prod.yml pull",
                  f"IMAGE_TAG={image_tag} docker compose -f docker-compose.prod.yml up -d",
                  "echo \"Image after deploy:\"",
                  "docker inspect food-checker-api --format '{{.Config.Image}}' || true",
                  "",
                  "section \"/health check\"",
                  "health_ok=0",
                  "for attempt in $(seq 1 30); do",
                  "  if curl -fsS http://127.0.0.1:8000/health; then",
                  "    health_ok=1",
                  "    break",
                  "  fi",
                  "  sleep 2",
                  "done",
                  "if [ \"$health_ok\" -ne 1 ]; then",
                  "  echo \"Backend health check failed after 60 seconds.\" >&2",
                  "  print_backend_logs 80",
                  "  exit 1",
                  "fi",
                  "",
                  "section \"Synthetic /analyze check\"",
                  "analyze_response=/tmp/food-checker-analyze-response.json",
                  "if ! curl -fsS -X POST http://127.0.0.1:8000/analyze \\",
                  "  -H 'Content-Type: application/json' \\",
                  "  -d '{\"text\":\"milk, wheat flour, soybean oil, red 40, sugar\",\"selected_rules\":[\"milk\"]}' \\",
                  "  -o \"$analyze_response\"; then",
                  "  echo \"Synthetic analyze request failed.\" >&2",
                  "  print_backend_logs 80",
                  "  exit 1",
                  "fi",
                  "if ! python3 - <<'PY'",
                  "import json",
                  "import sys",
                  "",
                  "path = '/tmp/food-checker-analyze-response.json'",
                  "with open(path, encoding='utf-8') as handle:",
                  "    payload = json.load(handle)",
                  "",
                  "match_count = payload.get('match_count')",
                  "if not isinstance(match_count, int) or match_count < 1:",
                  "    print(f'Expected match_count >= 1, got {match_count!r}', file=sys.stderr)",
                  "    sys.exit(1)",
                  "",
                  "print(f'Synthetic analyze match_count={match_count}')",
                  "PY",
                  "then",
                  "  echo \"Synthetic analyze response:\" >&2",
                  "  cat \"$analyze_response\" >&2 || true",
                  "  print_backend_logs 80",
                  "  exit 1",
                  "fi",
                  "",
                  "section \"Post-deploy cleanup\"",
                  "docker image prune -a -f --filter \"until=168h\"",
                  "docker builder prune -a -f --filter \"until=168h\"",
                  "rm -rf /tmp/aws || true",
                  "",
                  "section \"Disk/docker usage after cleanup\"",
                  "df -h",
                  "docker system df || true",
                  "",
                  "section \"Recent backend logs\"",
                  "print_backend_logs 40",
              ]
          )

          commands = [
              "cat > /tmp/food-checker-deploy.sh <<'EOF'\n" + script + "\nEOF",
              "chmod +x /tmp/food-checker-deploy.sh",
              "bash /tmp/food-checker-deploy.sh",
          ]

          with open("/tmp/ssm-parameters.json", "w", encoding="utf-8") as handle:
              json.dump({"commands": commands}, handle)
          PY

          command_id="$(
            aws ssm send-command \
              --instance-ids "$BACKEND_INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy Food Checker backend image ${IMAGE_TAG}" \
              --parameters file:///tmp/ssm-parameters.json \
              --query "Command.CommandId" \
              --output text
          )"

          echo "command_id=${command_id}" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command ${command_id} to ${BACKEND_INSTANCE_ID}."

      - name: Wait for SSM deploy command
        id: wait-command
        run: |
          set -euo pipefail

          command_id="${{ steps.send-command.outputs.command_id }}"
          status="Pending"

          for _ in $(seq 1 90); do
            status="$(
              aws ssm get-command-invocation \
                --command-id "$command_id" \
                --instance-id "$BACKEND_INSTANCE_ID" \
                --query "Status" \
                --output text 2>/dev/null || true
            )"

            case "$status" in
              Success|Failed|Cancelled|TimedOut)
                break
                ;;
            esac

            sleep 5
          done

          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "SSM command ${command_id} finished with status: ${status}"

      - name: Fetch SSM command output
        run: |
          set -euo pipefail

          command_id="${{ steps.send-command.outputs.command_id }}"
          status="${{ steps.wait-command.outputs.status }}"

          echo "Standard output:"
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$BACKEND_INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text

          echo "Standard error:"
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$BACKEND_INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text

          test "$status" = "Success"
