global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: food-checker-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: node_exporter
    static_configs:
      - targets:
          - node_exporter:9100
